# ============================================================================
# CRM Perimeter — IP allowlist для nginx
# ----------------------------------------------------------------------------
# Назначение: определить 2 переменных `$crm_trusted_ip` и `$webhook_trusted_ip`,
# которые затем используются в `crm-gate.snippet.conf` для блокировки
# CRM-location'ов (/employee/, /api/crm/, /api/admin/, /grafana/ и т.д.)
# с внешних IP-адресов.
#
# Путь установки: /etc/nginx/conf.d/00-crm-allowlist.conf
# (префикс 00- гарантирует загрузку ДО sites-enabled/*)
#
# Требования:
#   - nginx собран с ngx_http_geo_module (стандартно включён)
#   - файл /etc/nginx/conf.d/admin-ips.inc существует (даже пустой)
#     → генерируется через scripts/apply-admin-ips.sh
#
# Проверка синтаксиса: `nginx -t`
# Reload: `nginx -s reload` (безопасно — не роняет соединения)
# ============================================================================

# ---- $crm_trusted_ip -------------------------------------------------------
# 1 = разрешено зайти в CRM, 0 = блокировка (HTTP 403).
#
# Источники доверия:
#   - 127.0.0.1/32         → localhost (health-check, внутренние curl)
#   - 10.200.0.0/24        → WireGuard VPN подсеть (wg0), peer'ы добавляются
#                            через scripts/wg-add-peer.sh
#   - admin-ips.inc        → белый список публичных IP администраторов
#                            (заполняется через scripts/apply-admin-ips.sh,
#                            env ADMIN_PUBLIC_IPS='1.2.3.4/32,5.6.7.8/32')
geo $crm_trusted_ip {
    default          0;
    127.0.0.1/32     1;  # localhost (health-check из cron, curl на сервере)
    10.200.0.0/24    1;  # WireGuard wg0 (офисные пиры)

    # Подключаем admin-ips.inc — может быть пустым.
    # Формат строк внутри: `203.0.113.42/32 1;  # комментарий`
    include /etc/nginx/conf.d/admin-ips.inc;
}

# ---- $webhook_trusted_ip ---------------------------------------------------
# Публичные webhook-endpoint'ы (Telegram/VK/MAX/Модульбанк) НЕ защищены
# allowlist'ом по требованию — они должны приниматься отовсюду. Но мы
# сохраняем этот geo-map для опционального ужесточения (если Модульбанк
# пришлёт свой диапазон — включим /api/payments/modulbank/webhook через
# $webhook_trusted_ip = 1).
#
# TODO (open question #2 в README): получить у Модульбанк официальный список
# исходящих IP и добавить сюда. Пока диапазон Telegram заявлен.
geo $webhook_trusted_ip {
    default          0;

    # Telegram Bot API (официально опубликовано Telegram)
    # https://core.telegram.org/bots/webhooks#the-short-version
    149.154.160.0/20 1;
    91.108.4.0/22    1;

    # VK Callback API — VK не публикует фиксированный диапазон.
    # Верификация идёт через secret_key в payload.
    # → полагаемся на HMAC, не на IP.

    # MAX (мессенджер) — диапазоны не опубликованы.
    # → полагаемся на HMAC подписи.

    # Модульбанк — TBD, запросить в support.
    # Пока webhook принимается без IP-фильтра (только signature verify).
}
