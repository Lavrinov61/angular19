# ============================================================================
# crm-gate.snippet.conf — IP-gate для CRM-location'ов
# ----------------------------------------------------------------------------
# Этот snippet включается директивой `include` внутри КАЖДОГО CRM-location'а
# в /etc/nginx/sites-enabled/svoefoto.ru.
#
# Путь установки: /etc/nginx/snippets/crm-gate.conf
# Использование (пример):
#
#     location /employee/ {
#         include /etc/nginx/snippets/crm-gate.conf;  # ← IP-allowlist
#         proxy_pass http://127.0.0.1:4000;
#         ...
#     }
#
# Rollback: `scripts/rollback.sh` заменяет содержимое файла на пустой
# комментарий и делает reload — gate отключается без правки sites-enabled/.
#
# Зависимости: $crm_trusted_ip определён в conf.d/00-crm-allowlist.conf.
# ============================================================================

# Если IP не в allowlist — отдаём 403 с понятным текстом.
# 403 (а не 404) выбран намеренно — администратор сразу понимает что
# проблема в IP-allowlist, а не в роутинге/деплое.
if ($crm_trusted_ip = 0) {
    return 403 "Access restricted to office network. Connect via WireGuard (wg0) or contact admin to whitelist your IP.";
}
