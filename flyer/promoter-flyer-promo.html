<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Акционный флаер — Своё Фото</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
@page{size:105mm 148mm;margin:0}

:root{
  --bg:#0a0a0a;--bg2:#131210;--bg3:#1c1b18;
  --am:#f59e0b;--am2:#fbbf24;--amd:#d97706;
  --t1:#f5f5f5;--t2:#a0a0a0;--t3:#666;
  --brd:rgba(255,255,255,.07);
  --glow:rgba(245,158,11,.12);
  --fd:'Oswald',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;
}

body{
  background:#1a1918;font-family:var(--fb);color:var(--t1);
  display:flex;flex-direction:column;align-items:center;gap:50px;padding:50px 20px;
}

.tag{color:#555;font-size:9px;text-transform:uppercase;letter-spacing:.25em;margin-bottom:-38px}

/* === CARD === */
.card{
  width:105mm;height:148mm;background:var(--bg);overflow:hidden;position:relative;
  print-color-adjust:exact;-webkit-print-color-adjust:exact;
}
@media screen{.card{box-shadow:0 20px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);border-radius:4px}}
@media print{
  body{background:none;padding:0;gap:0}
  .tag{display:none}
  .card{page-break-after:always;box-shadow:none;border-radius:0}
}

/* noise texture overlay */
.card::before{
  content:'';position:absolute;inset:0;z-index:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
  pointer-events:none;
}

/* === LAYOUT === */
.f{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

/* === AMBER TOP BAR === */
.f-top{
  background:linear-gradient(90deg,var(--amd),var(--am) 50%,var(--amd));
  color:#000;text-align:center;
  padding:6px 10px;font-family:var(--fd);font-weight:700;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  position:relative;
}
.f-top::after{
  content:'';position:absolute;bottom:-6px;left:0;right:0;height:6px;
  background:linear-gradient(to bottom,rgba(245,158,11,.08),transparent);
  pointer-events:none;
}

/* === HERO === */
.f-hero{
  text-align:center;padding:16px 18px 0;position:relative;
}
/* ambient glow behind heading */
.f-hero::before{
  content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.1) 0%,transparent 70%);
  pointer-events:none;
}

.f-h{
  font-family:var(--fd);font-weight:800;font-size:36px;
  text-transform:uppercase;line-height:.94;letter-spacing:-.01em;
  position:relative;z-index:1;
}

.f-sub{
  font-family:var(--fd);font-weight:700;font-size:16px;
  color:var(--am);text-transform:uppercase;letter-spacing:.08em;
  margin-top:5px;position:relative;z-index:1;
}
/* decorative line under sub */
.f-sub::after{
  content:'';display:block;width:32px;height:2px;
  background:linear-gradient(90deg,transparent,var(--amd),transparent);
  margin:8px auto 0;
}

/* === BULLET LIST === */
.f-list{
  padding:10px 24px 0;position:relative;z-index:1;
}
.f-li{
  display:flex;align-items:center;gap:9px;
  font-size:11.5px;font-weight:500;padding:3px 0;
  color:var(--t2);line-height:1.3;
}
.f-li .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--am);
  box-shadow:0 0 6px rgba(245,158,11,.3);
}

/* === PROMO BLOCK — ~30% of card area === */
.f-promo{
  margin:12px 12px 0;padding:12px 14px 14px;
  position:relative;z-index:1;
  border-radius:10px;
  /* layered background: gradient + subtle inner pattern */
  background:
    linear-gradient(160deg,rgba(245,158,11,.14) 0%,rgba(217,119,6,.04) 100%);
  /* dashed border via outline to keep bg clean */
  border:2px dashed var(--amd);
  box-shadow:
    0 0 50px rgba(245,158,11,.12),
    0 0 100px rgba(245,158,11,.05),
    inset 0 0 30px rgba(245,158,11,.04),
    inset 0 1px 0 rgba(255,255,255,.06);
}
/* corner accents */
.f-promo::before,.f-promo::after{
  content:'';position:absolute;width:18px;height:18px;
  border-color:var(--am);border-style:solid;opacity:.4;
}
.f-promo::before{
  top:6px;left:6px;
  border-width:2px 0 0 2px;border-radius:4px 0 0 0;
}
.f-promo::after{
  bottom:6px;right:6px;
  border-width:0 2px 2px 0;border-radius:0 0 4px 0;
}

.f-promo-label{
  font-family:var(--fd);font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.2em;
  color:var(--t2);margin-bottom:4px;
}

.f-promo-code{
  font-family:var(--fd);font-weight:800;font-size:48px;
  color:var(--am);letter-spacing:.1em;line-height:1.05;
  text-shadow:
    0 0 30px rgba(245,158,11,.35),
    0 0 60px rgba(245,158,11,.12),
    0 2px 4px rgba(0,0,0,.5);
  /* slight scale for visual punch */
  transform:scaleY(1.02);
}

.f-promo-cta{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:8px;
  font-size:11px;font-weight:700;color:var(--t1);
  letter-spacing:.02em;
}
.f-promo-cta .check{
  width:16px;height:16px;border-radius:50%;
  background:var(--am);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.f-promo-cta .check svg{width:10px;height:10px}

/* thin divider */
.f-promo-sep{
  width:36px;height:1px;margin:6px auto 4px;
  background:linear-gradient(90deg,transparent,var(--amd),transparent);
}

.f-promo-fine{
  font-size:8.5px;color:var(--t3);letter-spacing:.03em;
}

/* === BOTTOM BAR === */
.f-bot{
  margin-top:auto;
  background:var(--bg3);
  border-top:1px solid var(--brd);
  padding:7px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
.f-bot-info{min-width:0}
.f-addr{
  font-family:var(--fd);font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:.02em;
  white-space:nowrap;
}
.f-site{
  font-size:8px;color:var(--t3);margin-top:1px;
  letter-spacing:.04em;
}

/* QR placeholder */
.f-qr{
  width:46px;height:46px;background:#fff;border-radius:4px;padding:3px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.f-qr-inner{
  width:100%;height:100%;border-radius:2px;
  background:
    repeating-conic-gradient(#222 0% 25%, #fff 0% 50%) 50%/7px 7px;
}
</style>
</head>
<body>

<div class="tag">Акционный A6 (105x148 мм) — односторонний</div>
<div class="card">
<div class="f">

  <!-- Amber bar: hours -->
  <div class="f-top">Ежедневно 09:00 — 19:30</div>

  <!-- Hero: main message -->
  <div class="f-hero">
    <div class="f-h">Фото на<br>документы</div>
    <div class="f-sub">Готово за 5 минут</div>
  </div>

  <!-- Services bullet list -->
  <div class="f-list">
    <div class="f-li"><span class="dot"></span>Паспорт РФ / Загранпаспорт</div>
    <div class="f-li"><span class="dot"></span>Визы любых стран</div>
    <div class="f-li"><span class="dot"></span>Студенческий / Военный билет</div>
  </div>

  <!-- Promo code block — dominant element -->
  <div class="f-promo">
    <div class="f-promo-label">Скидка по промокоду</div>
    <div class="f-promo-code">{{CODE}}</div>
    <div class="f-promo-sep"></div>
    <div class="f-promo-cta">
      <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      Покажи флаер на кассе
    </div>
    <div class="f-promo-sep"></div>
    <div class="f-promo-fine">Одноразовый промокод</div>
  </div>

  <!-- Bottom: address + QR -->
  <div class="f-bot">
    <div class="f-bot-info">
      <div class="f-addr">пер. Соборный, 21</div>
      <div class="f-site">svoefoto.ru</div>
    </div>
    <div class="f-qr"><div class="f-qr-inner"></div></div>
  </div>

</div>
</div>

</body>
</html>
