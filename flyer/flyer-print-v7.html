<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ксерокопия / Печать — Своё Фото</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
@page{size:105mm 148mm;margin:0}
:root{
  --bg:#0a0a0a;--bg2:#131210;--bg3:#1c1b18;
  --am:#f59e0b;--am2:#fbbf24;--amd:#d97706;
  --t1:#f5f5f5;--t2:#a0a0a0;--t3:#666;
  --brd:rgba(255,255,255,.07);
  --fd:'Oswald',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;
}
body{background:#1a1918;font-family:var(--fb);color:var(--t1);display:flex;flex-direction:column;align-items:center;gap:50px;padding:50px 20px}
.tag{color:#555;font-size:9px;text-transform:uppercase;letter-spacing:.25em;margin-bottom:-38px}

.card{width:105mm;height:148mm;background:var(--bg);overflow:hidden;position:relative;print-color-adjust:exact;-webkit-print-color-adjust:exact}
@media screen{.card{box-shadow:0 20px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);border-radius:4px}}
@media print{body{background:none;padding:0;gap:0}.tag{display:none}.card{page-break-after:always;box-shadow:none;border-radius:0}}
.card::before{content:'';position:absolute;inset:0;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px;pointer-events:none}

.f{display:flex;flex-direction:column;height:100%;position:relative;z-index:1}

.f-top{background:linear-gradient(90deg,var(--amd),var(--am) 50%,var(--amd));color:#000;text-align:center;padding:5px 10px;font-family:var(--fd);font-weight:700;font-size:8.5px;letter-spacing:.22em;text-transform:uppercase}

.f-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 16px;position:relative}
.f-hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.08) 0%,transparent 70%);pointer-events:none}
.f-offer{font-family:var(--fd);font-weight:800;font-size:28px;text-transform:uppercase;line-height:1;letter-spacing:-.01em;position:relative;z-index:1}
.f-offer b{color:var(--am);text-shadow:0 0 20px rgba(245,158,11,.3)}
.f-sub{font-family:var(--fd);font-weight:700;font-size:16px;color:var(--am2);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;position:relative;z-index:1}

.f-promo{margin:0 14px;padding:8px 12px 10px;position:relative;z-index:1;border-radius:10px;background:linear-gradient(160deg,rgba(245,158,11,.12) 0%,rgba(217,119,6,.04) 100%);border:2px dashed var(--amd);box-shadow:0 0 40px rgba(245,158,11,.1),inset 0 0 20px rgba(245,158,11,.03);text-align:center}
.f-promo::before,.f-promo::after{content:'';position:absolute;width:14px;height:14px;border-color:var(--am);border-style:solid;opacity:.35}
.f-promo::before{top:5px;left:5px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.f-promo::after{bottom:5px;right:5px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.f-promo-label{font-family:var(--fd);font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--t3)}
.f-promo-sticker{width:50mm;height:14mm;margin:3px auto;background:#fff;border-radius:4px;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:9px;font-weight:600;color:#bbb;letter-spacing:.12em;text-transform:uppercase;print-color-adjust:exact;-webkit-print-color-adjust:exact}
.f-promo-cta{display:inline-flex;align-items:center;gap:4px;margin-top:2px;font-size:10px;font-weight:700;color:var(--t1);letter-spacing:.02em}
.f-promo-cta .check{width:14px;height:14px;border-radius:50%;background:var(--am);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.f-promo-cta .check svg{width:9px;height:9px}

.f-content{padding:8px 20px 0;position:relative;z-index:1}
.f-row{display:flex;justify-content:space-between;align-items:baseline;padding:2.5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;font-weight:500;color:var(--t2)}
.f-row:last-child{border-bottom:none}
.f-row .v{color:var(--am);font-family:var(--fd);font-weight:700;font-size:10.5px;flex-shrink:0;margin-left:8px}

.f-bot{margin-top:auto;background:var(--bg3);border-top:1px solid var(--brd);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.f-bot-info{min-width:0}
.f-bot-brand{font-family:var(--fd);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.f-bot-brand span{color:var(--am)}
.f-addr{font-size:8px;color:var(--t2);margin-top:1px}
.f-addr b{color:var(--am2);font-weight:600}
.f-site{font-size:7px;color:var(--t3);margin-top:1px;letter-spacing:.04em}
.f-qr{width:42px;height:42px;background:#fff;border-radius:4px;padding:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.f-qr-inner{width:100%;height:100%;border-radius:2px;background:repeating-conic-gradient(#222 0% 25%,#fff 0% 50%) 50%/7px 7px}
</style>
</head>
<body>

<div class="tag">A6 односторонний — Ксерокопия / Печать</div>
<div class="card">
<div class="f">

  <div class="f-top">Ежедневно 09:00 — 19:30</div>

  <div class="f-hero">
    <div class="f-offer"><b>2 копии</b><br>бесплатно</div>
    <div class="f-sub">Ксерокопия от 10₽</div>
  </div>

  <div class="f-promo">
    <div class="f-promo-label">Твой промокод</div>
    <div class="f-promo-sticker">наклей промокод</div>
    <div class="f-promo-cta">
      <span class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
      Покажи флаер на кассе
    </div>
  </div>

  <div class="f-content">
    <div class="f-row"><span>Ксерокопия ч/б</span><span class="v">10 ₽</span></div>
    <div class="f-row"><span>Печать документов</span><span class="v">10 ₽</span></div>
    <div class="f-row"><span>Печать фото 10×15</span><span class="v">от 19 ₽</span></div>
    <div class="f-row"><span>Ламинирование</span><span class="v">100 ₽</span></div>
  </div>

  <div class="f-bot">
    <div class="f-bot-info">
      <div class="f-bot-brand">Своё <span>Фото</span></div>
      <div class="f-addr">Соборный 21 — <b>50 м от Садовой</b></div>
      <div class="f-site">svoefoto.ru</div>
    </div>
    <div class="f-qr"><div class="f-qr-inner"></div></div>
  </div>

</div>
</div>

</body>
</html>
