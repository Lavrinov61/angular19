# ============================================================================
# nginx location blocks: telephony-owned phone auth + /api/telephony/*
#
# Назначение:
#   Выносит telephony HTTP slice на отдельный backend process (:3009), включая:
#     - GET  /api/auth/phone-check
#     - GET  /api/auth/phone-captcha/challenge
#     - POST /api/auth/phone-code
#     - POST /api/auth/phone-verify
#     - POST /api/auth/profile-phone-verify
#     - /api/telephony/*
#
#   Это убирает зависимость новых phone-auth запросов от main API runtime
#   во время API-only deploy/reload.
#
# Где подключить:
#   На production nginx — `/etc/nginx/includes/svoefoto-locations.conf`,
#   вставить ПЕРЕД общим `location ^~ /api/`.
#
# Применение (однократно, после деплоя backend):
#   sudo cp /var/www/apimain/angular-dev/deploy-configs/nginx/telephony-location.conf \
#           /etc/nginx/includes/telephony-location.conf
#   # затем в svoefoto-locations.conf добавить include перед общим /api:
#   #   include /etc/nginx/includes/telephony-location.conf;
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

location = /api/auth/phone-check {
    client_max_body_size 120M;
    limit_req zone=api burst=120 nodelay;
    limit_conn addr 20;

    proxy_pass http://127.0.0.1:3009;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_proto;
    proxy_set_header Authorization $http_authorization;
    proxy_pass_header Set-Cookie;
}

