# ============================================================================
# nginx location block: /api/visitor-chat/*
#
# Назначение:
#   Гарантирует, что HTTP-ответы ручки чат-виджета не кэшируются посредниками
#   и не склеиваются для разных Authorization-хедеров. Включает явный
#   `Cache-Control: no-store` и `Vary: Authorization` (browser / CDN).
#
# Где подключить:
#   На production nginx — `/etc/nginx/includes/svoefoto-locations.conf`,
#   блок-включатель для `svoefoto.ru`. Вставить ПЕРЕД общим `location ^~ /api/`.
#
# Применение (однократно, после деплоя backend):
#   sudo cp /var/www/apimain/angular-dev/deploy-configs/nginx/visitor-chat-location.conf \
#           /etc/nginx/includes/visitor-chat-location.conf
#   # затем в svoefoto-locations.conf добавить `include` перед `location ^~ /api/`:
#   #   include /etc/nginx/includes/visitor-chat-location.conf;
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

location ^~ /api/visitor-chat/ {
    client_max_body_size 50M;
    limit_req zone=api burst=600 nodelay;
    limit_conn addr 30;

    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_proto;

    # SECURITY: разные Authorization = разные тела ответа. Нельзя
    # кэшировать на посредниках (CDN, corp proxy, browser back/forward).
    proxy_set_header Authorization $http_authorization;

    # Ответы чата per-visitor — никакого кэширования.
    add_header Cache-Control "private, no-store, max-age=0" always;
    add_header Vary "Authorization" always;

    # Keep upstream Set-Cookie if backend ever sets it (currently only JWT cookie on login).
    proxy_pass_header Set-Cookie;
}
