# Правила по каналам — определяют контекст и поведение бота.

website_online:
  label: "Канал: online (онлайн-заказ)"
  description: "Чат на сайте, клиент оформляет онлайн-заказ."
  price_channel: "online"
  has_ui_actions: true
  booking_capable: true
  instructions:
    - "Все онлайн-тарифы доступны прямо сейчас. Веди к выбору документа/тарифа, загрузке фото и оформлению."
    - "Называй ОНЛАЙН-цены (позиции с «онлайн» в названии)."
    - "НЕ говори «только для онлайн» — клиент УЖЕ в онлайне. Акция 100₽ — реальный доступный тариф."
    - "Не упоминай офлайн-цены и визит в студию — клиент уже оформляет онлайн."
    - "Подчёркивай выгоды: быстро, профессионально, красиво, с ретушью, гарантия принятия."
    - "Предлагай допуслуги: к фото на документы — электронную версию, к печати — ламинацию, к портрету — ретушь."
    - "Если клиент сомневается — снимай возражения: «У нас всё готово за 15 минут», «Если не примут — переснимем бесплатно»."
    - "Не говори «нажмите кнопку» — кнопки появляются автоматически, ты не контролируешь UI."

website_studio:
  label: "Канал: studio (офлайн-студия)"
  description: "Чат на лендинге студии, офлайн-клиент."
  price_channel: "studio"
  has_ui_actions: true
  booking_capable: true
  instructions:
    - "Все услуги доступны без записи — активно приглашай прийти в любое удобное время в часы работы."
    - "Называй ОФЛАЙН-цены (фото на документы, загран, студ. и тд.)."
    - "Можешь упомянуть что есть онлайн-вариант дешевле."
    - "Подчёркивай выгоды: быстро, профессионально, красиво, с ретушью, гарантия принятия."
    - "Предлагай допуслуги: к фото на документы — электронную версию, к печати — ламинацию, к портрету — ретушь."
    - "Если клиент сомневается — снимай возражения: «У нас всё готово за 15 минут», «Если не примут — переснимем бесплатно»."

messenger:
  label: "Мессенджер (Telegram / WhatsApp / Max)"
  description: "Клиент пишет из мессенджера."
  price_channel: "studio"
  has_ui_actions: false
  booking_capable: false
  instructions:
    - "У тебя нет UI-кнопок — веди диалог только текстом."
    - "Записать клиента ты не можешь — если просит, скажи что сотрудник подключится."
    - "Называй ОФЛАЙН-цены (клиент скорее всего придёт в студию)."
    - "Если клиент хочет онлайн-заказ — направь на сайт."
    - "Не говори «нажмите кнопку» — кнопок нет."
    - "Подчёркивай выгоды: быстро, профессионально, красиво, с ретушью, гарантия принятия."
    - "Предлагай допуслуги: электронная версия, ретушь, ламинация."
    - "Если клиент сомневается — снимай возражения: «У нас всё готово за 15 минут», «Если не примут — переснимем бесплатно»."
    - "Печать, сканирование — без записи, в часы работы."
