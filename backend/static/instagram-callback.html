<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Authorization</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #fafafa; }
    .container { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    .success-icon { color: #00a86b; font-size: 48px; margin-bottom: 20px; }
    .error-icon { color: #ed4956; font-size: 48px; margin-bottom: 20px; }
    .code-box { background: #f0f0f0; border: 1px solid #dbdbdb; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; }
    .instructions { color: #8e8e8e; font-size: 14px; line-height: 1.6; }
    button { background: #0095f6; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 15px; }
    button:hover { background: #0086e0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Success state -->
    <div id="success-view" class="hidden">
      <div class="success-icon">&check;</div>
      <h1>Авторизация успешна!</h1>
      <p>Скопируйте этот код и вставьте в терминал:</p>
      <div class="code-box" id="code-display"></div>
      <button id="copy-btn">Копировать код</button>
      <div class="instructions"><p>После копирования вернитесь в терминал и вставьте код.</p></div>
    </div>

    <!-- Error state -->
    <div id="error-view" class="hidden">
      <div class="error-icon">&cross;</div>
      <h1>Ошибка авторизации</h1>
      <p><strong id="error-name"></strong></p>
      <p id="error-desc"></p>
      <div class="instructions"><p>Попробуйте снова или проверьте настройки приложения.</p></div>
    </div>

    <!-- Waiting state -->
    <div id="waiting-view" class="hidden">
      <h1>Instagram Callback</h1>
      <p>Ожидание авторизации...</p>
    </div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var code = params.get('code');
      var error = params.get('error');
      var errorDesc = (params.get('error_description') || '').replace(/\+/g, ' ');

      if (code) {
        var cleanCode = code.replace(/#_$/, '');
        document.getElementById('success-view').classList.remove('hidden');
        document.getElementById('code-display').textContent = cleanCode;
        document.getElementById('copy-btn').addEventListener('click', function() {
          navigator.clipboard.writeText(cleanCode);
          this.textContent = 'Скопировано!';
        });
      } else if (error) {
        document.getElementById('error-view').classList.remove('hidden');
        document.getElementById('error-name').textContent = error;
        document.getElementById('error-desc').textContent = errorDesc;
      } else {
        document.getElementById('waiting-view').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
