syntax = "proto3";
package svf.auth.v1;

import "google/protobuf/timestamp.proto";

option java_package = "ru.svoefoto.proto.auth.v1";
option java_multiple_files = true;

// ── Auth Service — JWT management, OTP, session control ──

service AuthService {
  // Phone OTP flow
  rpc SendOtp(SendOtpRequest) returns (SendOtpResponse);
  rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);

  // Token management
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Current user
  rpc GetMe(GetMeRequest) returns (GetMeResponse);

  // 2FA
  rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);
}

// ── Messages ──

message SendOtpRequest {
  string phone = 1; // "+79001234567"
  string device_id = 2; // stable app install/device id for mobile anti-abuse limits
  string device_name = 3; // user-visible device name for logs/future session UX
}

message SendOtpResponse {
  bool success = 1;
  int32 retry_after_seconds = 2; // cooldown
  string message = 3;
}

message VerifyOtpRequest {
  string phone = 1;
  string code = 2;      // 4-digit voice OTP
  string device_id = 3;
  string device_name = 4;
  PhoneAuthProfile profile = 5; // optional; required by backend before issuing tokens for incomplete profiles
}

message VerifyOtpResponse {
  AuthTokens tokens = 1;
  bool requires_profile = 2;
  bool is_new_user = 3;
  string phone = 4;
}

message PhoneAuthProfile {
  string display_name = 1;
  string date_of_birth = 2; // YYYY-MM-DD, optional
}

message AuthTokens {
  string access_token = 1;
  string refresh_token = 2;
  UserProfile user = 3;
  bool requires_two_factor = 4;
  string temp_token = 5; // set when requires_two_factor = true
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  AuthTokens tokens = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message GetMeRequest {}

message GetMeResponse {
  UserProfile user = 1;
}

message UserProfile {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string phone = 4;
  string role = 5;            // "client", "employee", "admin"
  string photo_url = 6;
  bool email_verified = 7;
  bool two_factor_enabled = 8;
}

message Verify2FARequest {
  string temp_token = 1;
  string code = 2; // 6-digit TOTP
}

message Verify2FAResponse {
  AuthTokens tokens = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated Session sessions = 1;
}

message Session {
  string id = 1;
  string device_name = 2;
  string ip = 3;
  string location = 4;
  google.protobuf.Timestamp last_active = 5;
  bool is_current = 6;
}

message RevokeSessionRequest {
  string session_id = 1;
}

message RevokeSessionResponse {
  bool success = 1;
}

message RegisterPushTokenRequest {
  string device_id = 1;
  string platform = 2;       // "android", "ios"
  string push_provider = 3;  // "fcm", "hms", "rustore", "apns"
  string token = 4;
  string app_version = 5;
  string device_model = 6;
  string os_version = 7;
  string locale = 8;
}

message RegisterPushTokenResponse {
  bool success = 1;
}
