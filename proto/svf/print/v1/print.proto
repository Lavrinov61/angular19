syntax = "proto3";
package svf.print.v1;

import "google/protobuf/timestamp.proto";

option java_package = "ru.svoefoto.proto.print.v1";
option java_multiple_files = true;

// ── Print Service — print job management, ICC profiles, previews ──

service PrintService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc RequestPreview(RequestPreviewRequest) returns (RequestPreviewResponse);
  rpc SyncIccProfile(SyncIccProfileRequest) returns (SyncIccProfileResponse);
}

// ── Enums ──

enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_QUEUED = 1;
  JOB_STATE_SENDING = 2;
  JOB_STATE_APPLYING_ICC = 3;
  JOB_STATE_RENDERING_LAYOUT = 4;
  JOB_STATE_PRINTING = 5;
  JOB_STATE_COMPLETED = 6;
  JOB_STATE_FAILED = 7;
  JOB_STATE_CANCELLED = 8;
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_PRINT = 1;
  COMMAND_TYPE_CANCEL = 2;
  COMMAND_TYPE_STATUS_REQUEST = 3;
  COMMAND_TYPE_ICC_SYNC = 4;
  COMMAND_TYPE_PREVIEW_REQUEST = 5;
}

enum FitMode {
  FIT_MODE_UNSPECIFIED = 0;
  FIT_MODE_FIT = 1;
  FIT_MODE_FILL = 2;
  FIT_MODE_STRETCH = 3;
  FIT_MODE_ACTUAL = 4;
}

enum ColorMode {
  COLOR_MODE_UNSPECIFIED = 0;
  COLOR_MODE_COLOR = 1;
  COLOR_MODE_BW = 2;
}

enum Orientation {
  ORIENTATION_UNSPECIFIED = 0;
  ORIENTATION_AUTO = 1;
  ORIENTATION_PORTRAIT = 2;
  ORIENTATION_LANDSCAPE = 3;
}

enum RenderingIntent {
  RENDERING_INTENT_UNSPECIFIED = 0;
  RENDERING_INTENT_PERCEPTUAL = 1;
  RENDERING_INTENT_RELATIVE_COLORIMETRIC = 2;
  RENDERING_INTENT_SATURATION = 3;
  RENDERING_INTENT_ABSOLUTE_COLORIMETRIC = 4;
}

// ── Messages ──

message LayoutSettings {
  int32 rows = 1;
  int32 cols = 2;
  float cut_margin_mm = 3;
  bool cut_marks = 4;
  float cut_mark_length_mm = 5;
  float cut_mark_offset_mm = 6;
}

message PrintCommand {
  string job_id = 1;
  string printer_id = 2;
  CommandType command_type = 3;
  string file_url = 4;
  string file_name = 5;
  int32 copies = 6;
  string paper_size = 7;
  ColorMode color_mode = 8;
  string quality = 9;
  bool duplex = 10;
  Orientation orientation = 11;
  bool borderless = 12;
  string media_type = 13;
  FitMode fit_mode = 14;
  string icc_profile_key = 15;
  LayoutSettings layout = 16;
  string service_slug = 17;
  string document_template_slug = 18;
  string idempotency_key = 19;
  RenderingIntent rendering_intent = 20;
}

message PrintStatus {
  string job_id = 1;
  JobState state = 2;
  string error_message = 3;
  int32 progress_percent = 4;
  int32 pages_printed = 5;
  int32 total_pages = 6;
  ConsumableUsage consumable_usage = 7;
  google.protobuf.Timestamp timestamp = 8;
  string trace_id = 9;
}

message ConsumableUsage {
  float cyan_ml = 1;
  float magenta_ml = 2;
  float yellow_ml = 3;
  float black_ml = 4;
  float light_cyan_ml = 5;
  float light_magenta_ml = 6;
  int32 sheets_used = 7;
  string media_type = 8;
  string paper_size = 9;
}

message SupplyLevel {
  string name = 1;         // "cyan", "magenta", etc.
  float level_percent = 2; // 0.0-100.0
  string status = 3;       // "ok", "low", "empty"
}

message TrayStatus {
  string tray_name = 1;    // "tray1", "manual"
  string paper_size = 2;
  string media_type = 3;
  int32 capacity = 4;
  int32 current_level = 5;
  string status = 6;       // "ok", "empty", "jam"
}

message PrintCounters {
  int64 total_pages = 1;
  int64 color_pages = 2;
  int64 bw_pages = 3;
  int64 duplex_pages = 4;
}

message PrintError {
  string code = 1;
  string message = 2;
  string severity = 3;     // "warning", "error", "critical"
  google.protobuf.Timestamp occurred_at = 4;
}

message TelemetryReport {
  string bridge_id = 1;
  string printer_id = 2;
  bool is_online = 3;
  string state = 4;
  repeated string state_reasons = 5;
  repeated SupplyLevel supplies = 6;
  repeated TrayStatus trays = 7;
  PrintCounters counters = 8;
  repeated PrintError errors = 9;
  string model = 10;
  string manufacturer = 11;
  string serial_number = 12;
  string firmware_version = 13;
  ConsumableUsage consumable_usage = 14;
  google.protobuf.Timestamp timestamp = 15;
}

message SubmitJobRequest {
  PrintCommand command = 1;
}

message SubmitJobResponse {
  PrintStatus status = 1;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  PrintStatus status = 1;
}

message RequestPreviewRequest {
  string job_id = 1;
  string file_url = 2;
  string paper_size = 3;
  FitMode fit_mode = 4;
  string icc_profile_key = 5;
  LayoutSettings layout = 6;
  int32 preview_width_px = 7;
  int32 preview_height_px = 8;
}

message RequestPreviewResponse {
  string job_id = 1;
  bytes preview_image = 2;
  string content_type = 3;
  int32 width_px = 4;
  int32 height_px = 5;
}

message SyncIccProfileRequest {
  string profile_id = 1;
  string profile_name = 2;
  string media_type = 3;
  string file_url = 4;
  bool is_default = 5;
}

message SyncIccProfileResponse {
  bool success = 1;
  string error_message = 2;
}

message BridgeHeartbeat {
  string bridge_id = 1;
  string agent_type = 2;
  string agent_version = 3;
  string cups_version = 4;
  string os_info = 5;
  string hostname = 6;
  int64 uptime_seconds = 7;
  google.protobuf.Timestamp timestamp = 8;
}
