<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Студвесна 2026 — Своё Фото</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700;800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;display:flex;align-items:center;justify-content:center}

.slide{
  width:1920px;height:1080px;
  background:#0f0f0f;
  position:relative;overflow:hidden;
  display:flex;align-items:center;
  font-family:'Plus Jakarta Sans',sans-serif;
  color:#fff;
}

/* Subtle background glow */
.slide::before{
  content:'';position:absolute;
  right:260px;top:50%;transform:translateY(-50%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 70%);
  pointer-events:none;
}

/* Left content area */
.left{
  flex:0 0 60%;padding:80px 60px 80px 120px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;z-index:1;
}

.logo{
  font-family:'Oswald',sans-serif;font-weight:800;
  font-size:52px;letter-spacing:.06em;text-transform:uppercase;
  color:#fff;margin-bottom:48px;
}
.logo span{color:#f59e0b}

.offer{
  font-family:'Oswald',sans-serif;font-weight:800;
  font-size:148px;line-height:.92;letter-spacing:-.02em;
  text-transform:uppercase;color:#f59e0b;
  margin-bottom:8px;
}

.offer-sub{
  font-family:'Oswald',sans-serif;font-weight:700;
  font-size:72px;line-height:1;letter-spacing:.02em;
  text-transform:uppercase;color:#fff;
  margin-bottom:40px;
}

.services{
  font-size:22px;font-weight:400;color:#666;
  letter-spacing:.08em;margin-bottom:48px;
}
.services span{margin:0 12px;opacity:.4}

/* Promo code box */
.promo{
  display:inline-flex;align-items:center;gap:20px;
  border:2px solid rgba(245,158,11,.4);border-radius:12px;
  padding:16px 32px;margin-bottom:40px;
  background:rgba(245,158,11,.04);
  align-self:flex-start;
}
.promo-label{
  font-size:16px;font-weight:600;color:#666;
  text-transform:uppercase;letter-spacing:.15em;
}
.promo-code{
  font-family:'Oswald',sans-serif;font-weight:800;
  font-size:42px;color:#f59e0b;letter-spacing:.1em;
}

.site{
  font-size:20px;font-weight:400;color:#555;letter-spacing:.06em;
}

/* Amber accent line */
.accent-line{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:5px;height:400px;
  background:linear-gradient(180deg,transparent,#f59e0b 30%,#f59e0b 70%,transparent);
  border-radius:3px;
}

/* Right QR area */
.right{
  flex:0 0 40%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:1;
  padding-right:80px;
}

.qr-glow{
  position:relative;
  padding:24px;border-radius:20px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
}
.qr-glow::before{
  content:'';position:absolute;inset:-40px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.08) 0%,transparent 60%);
  pointer-events:none;z-index:-1;
}

.qr-glow canvas,
.qr-glow img{
  display:block;width:340px;height:340px;border-radius:8px;
}

.qr-hint{
  margin-top:24px;font-size:20px;font-weight:400;color:#555;
  letter-spacing:.04em;text-align:center;
}

/* Horizontal thin amber line at bottom */
.bottom-line{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,#f59e0b 20%,#f59e0b 80%,transparent);
}
</style>
</head>
<body>

<div class="slide">
  <div class="accent-line"></div>

  <div class="left">
    <img src="../svoefoto-whitelogo.png" alt="Своё Фото" style="height:60px;margin-bottom:48px">
    <div class="offer">БЕСПЛАТНАЯ ПЕЧАТЬ</div>
    <div class="offer-sub">ДОКУМЕНТОВ И ФОТО</div>
    <div class="services">Сканируй QR — месяц бесплатно</div>
    <div class="promo">
      <span class="promo-label">Промокод</span>
      <span class="promo-code">STUDVESNA26</span>
    </div>
    <div class="site">svoefoto.ru</div>
  </div>

  <div class="right">
    <div class="qr-glow">
      <canvas id="qr"></canvas>
    </div>
    <div class="qr-hint">Наведи камеру</div>
  </div>

  <div class="bottom-line"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
(function(){
  var qr = qrcode(0, 'M');
  qr.addData('https://svoefoto.ru/subscriptions?promo=STUDVESNA26');
  qr.make();

  var canvas = document.getElementById('qr');
  var size = 340;
  var modules = qr.getModuleCount();
  var cellSize = size / modules;

  canvas.width = size;
  canvas.height = size;

  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#ffffff';

  for (var r = 0; r < modules; r++) {
    for (var c = 0; c < modules; c++) {
      if (qr.isDark(r, c)) {
        ctx.fillRect(
          Math.round(c * cellSize),
          Math.round(r * cellSize),
          Math.ceil(cellSize),
          Math.ceil(cellSize)
        );
      }
    }
  }
})();
</script>

</body>
</html>
