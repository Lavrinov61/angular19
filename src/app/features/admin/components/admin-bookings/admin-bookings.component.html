<div class="admin-bookings-container">
  <h1 class="admin-title">Управление записями</h1>
  
  <mat-card class="bookings-card">
    <mat-card-header>
      <mat-card-title>Записи клиентов</mat-card-title>
      <mat-card-subtitle>Просмотр и редактирование записей</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="bookings-table">
          <!-- Date Column -->
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Дата</th>
            <td mat-cell *matCellDef="let booking">{{booking.date}}</td>
          </ng-container>
          
          <!-- Time Column -->
          <ng-container matColumnDef="time">
            <th mat-header-cell *matHeaderCellDef>Время</th>
            <td mat-cell *matCellDef="let booking">{{booking.time}}</td>
          </ng-container>
          
          <!-- Client Column -->
          <ng-container matColumnDef="client">
            <th mat-header-cell *matHeaderCellDef>Клиент</th>
            <td mat-cell *matCellDef="let booking">{{booking.client}}</td>
          </ng-container>
          
          <!-- Service Column -->
          <ng-container matColumnDef="service">
            <th mat-header-cell *matHeaderCellDef>Услуга</th>
            <td mat-cell *matCellDef="let booking">{{booking.service}}</td>
          </ng-container>
          
          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Статус</th>
            <td mat-cell *matCellDef="let booking">{{booking.status}}</td>
          </ng-container>
          
          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Действия</th>
            <td mat-cell *matCellDef="let booking">
              <button mat-button color="primary">Изменить</button>
              <button mat-button color="warn">Отменить</button>
            </td>
          </ng-container>
          
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
      
      <p class="development-note">Функционал управления бронированиями в разработке.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" routerLink="/admin">Назад к панели</button>
      <button mat-raised-button color="primary">Добавить запись</button>
    </mat-card-actions>
  </mat-card>
</div>
