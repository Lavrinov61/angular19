<div class="admin-gallery-container">
  <h1 class="admin-title">Управление галереей</h1>
  
  <mat-card class="gallery-card">
    <mat-card-header>
      <mat-card-title>Фотографии</mat-card-title>
      <mat-card-subtitle>Загрузка и редактирование фотографий</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="admin-gallery-grid">
        @for (photo of photos; track photo.id || photo.title || $index) {
          <div class="admin-photo-item">
            <div class="admin-photo-thumbnail">
              <div class="photo-actions" *appHasPermission="'catalog:manage'">
                <button mat-icon-button color="primary">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
              <img src="assets/static/gallery/placeholder.jpg" alt="{{photo.title}}" class="gallery-image">
            </div>
            <div class="admin-photo-info">
              <span class="photo-title">{{photo.title}}</span>
              <span class="photo-category">{{photo.category}}</span>
            </div>
          </div>
        }
        
        <div class="admin-photo-item add-photo">
          <div class="add-photo-button">
            <button mat-fab color="primary">
              <mat-icon>add</mat-icon>
            </button>
            <span>Добавить фото</span>
          </div>
        </div>
      </div>
      
      <p class="development-note">Функционал управления галереей в разработке.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" routerLink="/admin">Назад к панели</button>
    </mat-card-actions>
  </mat-card>
</div>
