syntax = "proto3";
package svf.infra;

// ── Agent Types ──

enum AgentType {
  AGENT_TYPE_UNSPECIFIED = 0;
  PRINT = 1;
  POS = 2;
  VISION = 3;
  MONITOR = 4;
}

enum UpdateState {
  UPDATE_STATE_UNSPECIFIED = 0;
  DOWNLOADING = 1;
  VERIFYING = 2;
  INSTALLING = 3;
  RESTARTING = 4;
  COMPLETED = 5;
  FAILED = 6;
  ROLLED_BACK = 7;
}

// ── Unified Heartbeat (all agents) ──

message AgentHeartbeat {
  string agent_id = 1;
  AgentType agent_type = 2;
  string version = 3;
  string os_info = 4;
  string os_arch = 5;
  string hostname = 6;
  int64 uptime_seconds = 7;
  int32 config_version = 8;
  int64 timestamp_ms = 9;
  map<string, string> metadata = 10;
}

// ── Auto-Update ──

message UpdateCommand {
  string command_id = 1;
  string target_version = 2;
  string artifact_url = 3;
  string artifact_hash_sha256 = 4;
  int64 artifact_size_bytes = 5;
  bool force = 6;
  string rollback_url = 7;
}

message UpdateStatus {
  string command_id = 1;
  UpdateState state = 2;
  int32 progress_percent = 3;
  string error_message = 4;
  string new_version = 5;
  int64 timestamp_ms = 6;
}

// ── Remote Config ──

message ConfigUpdate {
  int32 config_version = 1;
  bytes config_toml = 2;
  bool restart_required = 3;
  int64 timestamp_ms = 4;
}

message ConfigAck {
  string agent_id = 1;
  int32 applied_version = 2;
  bool success = 3;
  string error_message = 4;
  int64 timestamp_ms = 5;
}

// ── System Metrics (Device Monitor) ──

message SystemMetrics {
  string agent_id = 1;
  float cpu_percent = 2;
  int32 memory_used_mb = 3;
  int32 memory_total_mb = 4;
  float disk_used_gb = 5;
  float disk_total_gb = 6;
  int64 network_rx_bytes_sec = 7;
  int64 network_tx_bytes_sec = 8;
  repeated PeripheralStatus peripherals = 9;
  map<string, string> agent_statuses = 10;
  int64 timestamp_ms = 11;
}

message PeripheralStatus {
  string device_type = 1;
  string device_name = 2;
  string status = 3;
  string details = 4;
}

// ── POS ──

message PosPayCommand {
  string transaction_id = 1;
  int64 amount_kopecks = 2;
  string order_id = 3;
  string payment_method = 4;
  string description = 5;
}

message PosRefundCommand {
  string transaction_id = 1;
  int64 amount_kopecks = 2;
  string original_transaction_id = 3;
}

message PosFiscalCommand {
  string receipt_id = 1;
  string receipt_type = 2;
  repeated FiscalItem items = 3;
  int64 total_kopecks = 4;
  string payment_method = 5;
}

message FiscalItem {
  string name = 1;
  int64 price_kopecks = 2;
  int32 quantity = 3;
  string vat_rate = 4;
}

message PosTransactionResult {
  string transaction_id = 1;
  bool success = 2;
  string error_message = 3;
  string approval_code = 4;
  string rrn = 5;
  string card_mask = 6;
  bytes receipt_data = 7;
  int64 timestamp_ms = 8;
}

// ── Vision ──

message MotionEvent {
  string camera_id = 1;
  float confidence = 2;
  bytes thumbnail = 3;
  string zone = 4;
  int64 timestamp_ms = 5;
}

message CameraStatus {
  string camera_id = 1;
  bool is_online = 2;
  string resolution = 3;
  float fps = 4;
  int64 timestamp_ms = 5;
}

// ── Agent Alert (agent → server) ──

message AgentAlert {
  string agent_id = 1;
  string alert_type = 2;
  string severity = 3;
  string title = 4;
  string details_json = 5;
  int64 timestamp_ms = 6;
}

// ── Restart Command ──

message RestartCommand {
  string reason = 1;
  int32 delay_seconds = 2;
  int64 timestamp_ms = 3;
}
