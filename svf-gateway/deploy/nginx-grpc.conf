# gRPC Gateway upstream — add to nginx server block
#
# Install: copy relevant blocks into /etc/nginx/sites-available/svoefoto
# after the existing location blocks.
#
# Requirements: nginx >= 1.13.10 (grpc_pass support)

# gRPC native (HTTP/2 from gRPC clients)
location /svf. {
    grpc_pass grpc://127.0.0.1:50051;
    grpc_read_timeout 3600s;
    grpc_send_timeout 3600s;

    grpc_set_header X-Real-IP $remote_addr;
    grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# gRPC-Web (HTTP/1.1 from browser/Flutter web — via tonic-web)
location /svf-web/ {
    proxy_pass http://127.0.0.1:50051;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # gRPC-Web uses POST with application/grpc-web
    proxy_set_header Content-Type $content_type;

    # CORS for gRPC-Web (handled by tonic-web + tower-http, but nginx can also add)
    # add_header Access-Control-Allow-Origin *;
    # add_header Access-Control-Allow-Methods "POST, OPTIONS";
    # add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Grpc-Web, X-User-Agent";
}
